<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R2 Living — Już Wkrótce</title>
  <link rel="icon" type="image/svg+xml" href="../docs/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #14120F;
      --ink-2: #4a4540;
      --bone:  #F3EFE8;
      --stone: #8C8880;
      --moss:  #3D4A3A;
      --rule:  rgba(243,239,232,.18);
    }

    html, body {
      height: 100%;
      font-family: "Geist", sans-serif;
      background: var(--ink);
      color: var(--bone);
      overflow: hidden;
    }

    /* ── Background image ── */
    .bg {
      position: fixed;
      inset: 0;
      background: url('wspolna-04-dusk.jpg') center 40% / cover no-repeat;
      z-index: 0;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(20,18,15,.88) 0%, rgba(20,18,15,.60) 50%, rgba(20,18,15,.30) 100%),
        linear-gradient(180deg, rgba(20,18,15,.25) 0%, transparent 35%, rgba(20,18,15,.55) 100%);
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 64px 52px;
      max-width: 760px;
    }

    /* ── Logo ── */
    .logo svg path { fill: var(--bone); }
    .logo svg { opacity: .9; width: 110px; height: auto; }

    /* ── Main content ── */
    .content { display: flex; flex-direction: column; gap: 20px; }

    .eyebrow {
      font-family: "Geist Mono", monospace;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(243,239,232,.5);
    }

    h1 {
      font-family: "Instrument Serif", serif;
      font-weight: 400;
      font-size: clamp(42px, 6vw, 72px);
      line-height: 1.0;
      letter-spacing: -.02em;
      color: var(--bone);
    }

    h1 em {
      font-style: italic;
      color: #C9D5BE;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.65;
      color: rgba(243,239,232,.62);
      max-width: 480px;
      font-weight: 300;
    }

    /* ── Form ── */
    .form-wrap { display: flex; flex-direction: column; gap: 14px; }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    input[type="email"] {
      flex: 1;
      background: rgba(243,239,232,.08);
      border: 1px solid rgba(243,239,232,.18);
      border-radius: 4px;
      padding: 13px 16px;
      font-family: "Geist", sans-serif;
      font-size: 14px;
      color: var(--bone);
      outline: none;
      transition: border-color .2s;
    }
    input[type="email"]::placeholder { color: rgba(243,239,232,.35); }
    input[type="email"]:focus { border-color: rgba(243,239,232,.45); }

    button[type="submit"] {
      background: var(--moss);
      color: var(--bone);
      border: none;
      border-radius: 4px;
      padding: 13px 24px;
      font-family: "Geist Mono", monospace;
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    button[type="submit"]:hover { background: #4a5c46; }

    /* ── Checkbox (RODO) ── */
    .checkbox-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }

    .checkbox-wrap input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      min-width: 16px;
      border: 1px solid rgba(243,239,232,.3);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      margin-top: 1px;
      position: relative;
      transition: border-color .2s, background .2s;
    }
    .checkbox-wrap input[type="checkbox"]:checked {
      background: var(--moss);
      border-color: var(--moss);
    }
    .checkbox-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: 1.5px solid var(--bone);
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .checkbox-label {
      font-size: 11px;
      line-height: 1.6;
      color: rgba(243,239,232,.4);
    }
    .checkbox-label a {
      color: rgba(243,239,232,.55);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Footer ── */
    .footer-line {
      font-family: "Geist Mono", monospace;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(243,239,232,.28);
    }

    /* ── Success state ── */
    .success-msg {
      display: none;
      font-family: "Geist Mono", monospace;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #C9D5BE;
      padding: 13px 0;
    }

    @media (max-width: 600px) {
      .page { padding: 36px 28px 40px; }
      .input-row { flex-direction: column; }
      button[type="submit"] { width: 100%; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="page">

  <!-- Main content -->
  <div class="content">

    <h1>Coś wyjątkowego<br><em>jest w drodze.</em></h1>

    <p class="subtitle">Kameralne domy na spokojnych przedmieściach Warszawy — zaprojektowane z myślą o rodzinach, które cenią przestrzeń, ciszę i jakość wykonania. Już wkrótce.</p>

    <!-- Form -->
    <form class="form-wrap" netlify onsubmit="handleSubmit(event)">
      <div class="input-row">
        <input type="email" name="email" placeholder="Twój adres e-mail" required autocomplete="email">
        <button type="submit">Powiadom mnie</button>
      </div>

      <label class="checkbox-wrap">
        <input type="checkbox" required>
        <span class="checkbox-label">
          Wyrażam zgodę na przetwarzanie moich danych osobowych przez R2 Capital sp. z o.o. w celu otrzymywania informacji o aktualnych i przyszłych projektach deweloperskich, zgodnie z <a href="../docs/polityka-prywatnosci.html" target="_blank" rel="noopener">Polityką Prywatności</a>. Zgoda jest dobrowolna i może być wycofana w dowolnym momencie.
        </span>
      </label>

      <p class="success-msg" id="success">— Dziękujemy. Odezwiemy się wkrótce.</p>
    </form>
  </div>

  <!-- Footer -->
  <p class="footer-line">© 2026 R2 Capital sp. z o.o. · r2living.pl</p>

</div>

<script>
  function handleSubmit(e) {
    e.preventDefault();
    document.querySelector('.form-wrap .input-row').style.display = 'none';
    document.querySelector('.checkbox-wrap').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }
</script>
